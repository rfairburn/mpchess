# ── mpchess Helm values ──────────────────────────────────────
# Note: replicas is fixed at 1 — the server holds all game state in-memory.
# Multiple replicas would each run an independent game with no shared state.

image:
  repository: mpchess
  tag: "latest"
  pullPolicy: IfNotPresent
  # pullSecrets:
  #   - name: my-registry-secret

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000

# Gateway API (Gateway + HTTPRoute, default) or Ingress
gateway:
  type: httproute
  name: mpchess
  className: traefik
  host: chess.example.com
  tlsSecretName: mpchess-tls
  # cert-manager ClusterIssuer name (added as annotation on the Gateway)
  issuer: letsencrypt-prod

  # --- Ingress (ingress-nginx) ---
  # When type=ingress, these are used instead:
  # ingressClassName: nginx
  # ingressAnnotations:
  #   cert-manager.io/cluster-issuer: letsencrypt-prod

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Server CLI options (passed as args)
server:
  port: 3000
  # fen: "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1"
  # allowedOrigins: "chess.example.com,localhost"

# Config file (mounted as ConfigMap)
config:
  enabled: false
  # JSON content (comments stripped at runtime)
  content: |
    {
      "port": 3000
    }

# TLS certificate (mounted as Secret)
tls:
  enabled: false
  # cert: |
  #   -----BEGIN CERTIFICATE-----
  #   ...
  #   -----END CERTIFICATE-----
  # key: |
  #   -----BEGIN PRIVATE KEY-----
  #   ...
  #   -----END PRIVATE KEY-----

nodeSelector: {}
tolerations: []
affinity: {}

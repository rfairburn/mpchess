# ── mpchess Helm values ──────────────────────────────────────
# Note: replicas is fixed at 1 — the server holds all game state in-memory.
# Multiple replicas would each run an independent game with no shared state.

image:
  repository: mpchess
  tag: "latest"
  pullPolicy: IfNotPresent
  # pullSecrets:
  #   - name: my-registry-secret

service:
  type: ClusterIP
  # Port must match server.port. Service port name adapts to TLS mode.
  port: 3000

# Gateway API (Gateway + HTTPRoute), Ingress, or none
gateway:
  # httproute — Gateway + HTTPRoute (Gateway API, e.g. Traefik)
  # ingress  — classic Ingress resource (e.g. ingress-nginx)
  # none     — no ingress/gateway resources rendered
  type: httproute
  name: mpchess
  className: traefik
  host: chess.example.com
  tlsSecretName: mpchess-tls
  # cert-manager ClusterIssuer name (added as annotation on the Gateway)
  issuer: letsencrypt-prod

  # --- Ingress (ingress-nginx or Traefik) ---
  # When type=ingress, these are used instead:
  # ingressClassName: nginx
  # ingressAnnotations:
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  #
  # Ingress controller type for path-prefix stripping. Set to "traefik" or
  # "nginx" when using a non-root server.prefix so the chart renders the
  # correct rewrite annotations/resources. Leave empty for root path.
  # ingressController: traefik

  # Backend TLS — controls how the Gateway/Ingress connects to the pod.
  # When "auto" (default), backend TLS is enabled automatically if
  # tls.enabled=true, so the Gateway/Ingress speaks HTTPS to the pod.
  # Set to true to force-enable or false to force-disable.
  backendTls:
    enabled: auto
    # Skip certificate verification (insecure). Use only for testing with
    # self-signed certs. Adds the appropriate annotation/policy for your
    # gateway controller. Not recommended for production.
    insecureSkipVerify: false

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 512Mi

# Server settings — all passed as MPCHESS_* env vars.
server:
  port: 3000
  # fen: "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1"
  # allowedOrigins: "chess.example.com,localhost"
  # prefix: "/chess"   # URL prefix — configures both the app and Gateway/Ingress

# Optional user-defined ConfigMap (mounted at /app/config.json)
# Env vars for port/cert/key always supersede config file values.
config:
  enabled: false
  # JSON content (comments stripped at runtime)
  content: |
    {
      "allowedOrigins": ["chess.example.com"]
    }

# Pod-level TLS — when enabled, the app serves HTTPS inside the pod and
# kubelet probes use HTTPS. The TLS secret is mounted at /etc/tls and
# MPCHESS_CERT / MPCHESS_KEY env vars are set to point the app at the
# mounted files.
#
# When tls.enabled=true and a Gateway/Ingress is configured, the chart
# also configures backend TLS so the Gateway/Ingress connects to the pod
# over HTTPS (see gateway.backendTls below).
tls:
  enabled: false
  # Kubernetes TLS secret name (must contain tls.crt and tls.key)
  secretName: mpchess-tls
  # ConfigMap name for backend TLS CA certificate verification
  # (Gateway API BackendTLSPolicy). Must contain a "ca.crt" key with
  # the PEM-encoded CA that signed the pod's certificate.
  # For self-signed certs, create a ConfigMap from tls.crt:
  #   kubectl create configmap mpchess-tls-ca --from-file=ca.crt=tls.crt
  # Defaults to secretName with "-ca" suffix appended.
  # caConfigMap: mpchess-tls-ca
  #
  # Kubernetes Secret name for backend TLS CA certificate verification
  # (Traefik ServersTransport rootCAsSecrets, nginx proxy-ssl-secret). Must
  # contain a "ca.crt" key with the PEM-encoded CA certificate.
  # For self-signed certs:
  #   kubectl create secret generic mpchess-tls-ca --from-file=ca.crt=tls.crt
  # Defaults to secretName with "-ca" suffix appended.
  # caSecretName: mpchess-tls-ca

nodeSelector: {}
tolerations: []
affinity: {}

# Pod and container security contexts.
# The Dockerfile runs as non-root appuser (UID 100, GID 101), so runAsNonRoot
# is enforced with numeric IDs Kubernetes can verify.
# readOnlyRootFilesystem is disabled by default — enable it only if the
# application does not need to write to the root filesystem (e.g. /tmp).
securityContext:
  enabled: true
  pod:
    runAsNonRoot: true
    runAsUser: 100
    runAsGroup: 101
    fsGroup: 101
    seccompProfile:
      type: RuntimeDefault
  container:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

suite: httproute
release:
  name: mpchess
templates:
  - templates/httproute.yaml
tests:
  - it: no documents when gateway type is ingress (default)
    set:
      gateway:
        type: ingress
    asserts:
      - hasDocuments:
          count: 0

  - it: renders HTTPS route and HTTP redirect when type is httproute
    set:
      gateway:
        type: httproute
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: HTTPRoute

  - it: HTTPS route attaches to correct gateway and listener
    set:
      gateway:
        type: httproute
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: mpchess
      - equal:
          path: spec.parentRefs[0].name
          value: mpchess
      - equal:
          path: spec.parentRefs[0].sectionName
          value: https
      - equal:
          path: spec.hostnames[0]
          value: chess.example.com
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: mpchess
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 3000

  - it: HTTP redirect route attaches to http listener
    set:
      gateway:
        type: httproute
    documentIndex: 1
    asserts:
      - equal:
          path: metadata.name
          value: mpchess-http-redirect
      - equal:
          path: spec.parentRefs[0].name
          value: mpchess
      - equal:
          path: spec.parentRefs[0].sectionName
          value: http
      - equal:
          path: spec.rules[0].filters[0].type
          value: RequestRedirect
      - equal:
          path: spec.rules[0].filters[0].requestRedirect.scheme
          value: https
      - equal:
          path: spec.rules[0].filters[0].requestRedirect.statusCode
          value: 301

  - it: custom gateway name propagates to both routes
    set:
      gateway:
        type: httproute
        name: chess-gateway
    documentIndex: 0
    asserts:
      - equal:
          path: spec.parentRefs[0].name
          value: chess-gateway

  - it: custom gateway name propagates to redirect route
    set:
      gateway:
        type: httproute
        name: chess-gateway
    documentIndex: 1
    asserts:
      - equal:
          path: spec.parentRefs[0].name
          value: chess-gateway

  - it: custom host propagates to both routes
    set:
      gateway:
        type: httproute
        host: my-chess.example.com
    documentIndex: 0
    asserts:
      - equal:
          path: spec.hostnames[0]
          value: my-chess.example.com

  - it: custom host propagates to redirect route
    set:
      gateway:
        type: httproute
        host: my-chess.example.com
    documentIndex: 1
    asserts:
      - equal:
          path: spec.hostnames[0]
          value: my-chess.example.com

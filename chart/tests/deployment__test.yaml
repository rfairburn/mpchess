suite: deployment
release:
  name: mpchess
templates:
  - templates/deployment.yaml
tests:
  - it: default values render correctly
    asserts:
      - isKind:
          of: Deployment
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: mpchess
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.template.spec.containers[0].image
          value: mpchess:latest
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: IfNotPresent
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: MPCHESS_PORT
      - equal:
          path: spec.template.spec.containers[0].env[0].value
          value: "3000"
      - isNull:
          path: spec.template.spec.containers[0].args
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 3000
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 1000m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 1Gi
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 200m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 512Mi
      - isNull:
          path: spec.template.spec.containers[0].volumeMounts
      - isNull:
          path: spec.template.spec.volumes

  - it: respects custom image repository and tag
    set:
      image:
        repository: myregistry/mpchess
        tag: v1.2.3
        pullPolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: myregistry/mpchess:v1.2.3
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always

  - it: TLS enabled adds env vars, volume mounts, and HTTPS probes
    set:
      tls:
        enabled: true
        secretName: my-tls-secret
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[1].name
          value: MPCHESS_CERT
      - equal:
          path: spec.template.spec.containers[0].env[1].value
          value: /etc/tls/tls.crt
      - equal:
          path: spec.template.spec.containers[0].env[2].name
          value: MPCHESS_KEY
      - equal:
          path: spec.template.spec.containers[0].env[2].value
          value: /etc/tls/tls.key
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].name
          value: tls
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].mountPath
          value: /etc/tls/tls.crt
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].subPath
          value: tls.crt
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[1].mountPath
          value: /etc/tls/tls.key
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[1].subPath
          value: tls.key
      - equal:
          path: spec.template.spec.volumes[0].name
          value: tls
      - equal:
          path: spec.template.spec.volumes[0].secret.secretName
          value: my-tls-secret
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.scheme
          value: HTTPS
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.scheme
          value: HTTPS
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: https
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: https
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: https

  - it: config enabled adds config volume mount
    set:
      config:
        enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].name
          value: config
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].mountPath
          value: /app/config.json
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].subPath
          value: config.json
      - equal:
          path: spec.template.spec.volumes[0].name
          value: config

  - it: TLS and config together adds both volume mounts
    set:
      tls:
        enabled: true
        secretName: my-tls
      config:
        enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - lengthEqual:
          path: spec.template.spec.containers[0].volumeMounts
          count: 3
      - lengthEqual:
          path: spec.template.spec.volumes
          count: 2

  - it: custom server port changes env var and containerPort
    set:
      server:
        port: 8443
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].value
          value: "8443"
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8443

  - it: custom FEN adds MPCHESS_FEN env var
    set:
      server:
        fen: "4k3/8/8/8/8/8/8/4K2R w K - 0 1"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[1].name
          value: MPCHESS_FEN
      - equal:
          path: spec.template.spec.containers[0].env[1].value
          value: "4k3/8/8/8/8/8/8/4K2R w K - 0 1"

  - it: allowedOrigins adds MPCHESS_ALLOWED_ORIGINS env var
    set:
      server:
        allowedOrigins: "chess.example.com,localhost"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[1].name
          value: MPCHESS_ALLOWED_ORIGINS
      - equal:
          path: spec.template.spec.containers[0].env[1].value
          value: "chess.example.com,localhost"

  - it: debug adds MPCHESS_DEBUG env var
    set:
      server:
        debug: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[1].name
          value: MPCHESS_DEBUG
      - equal:
          path: spec.template.spec.containers[0].env[1].value
          value: "true"

  - it: has liveness and readiness probes with HTTP scheme by default
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].livenessProbe
      - isNotNull:
          path: spec.template.spec.containers[0].readinessProbe
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /
      - isNull:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.scheme
      - isNull:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.scheme
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: http
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: http

  - it: has standard labels
    asserts:
      - exists:
          path: metadata.labels["app.kubernetes.io/name"]
      - exists:
          path: metadata.labels["app.kubernetes.io/instance"]
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - exists:
          path: metadata.labels["app.kubernetes.io/managed-by"]

  - it: selector matchLabels match pod template labels
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: mpchess
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: mpchess

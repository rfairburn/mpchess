suite: ingress
release:
  name: mpchess
templates:
  - templates/ingress.yaml
tests:
  - it: no document when gateway type is httproute (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: renders Ingress when gateway type is ingress
    set:
      gateway:
        type: ingress
        ingressClassName: nginx
        ingressAnnotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
          nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Ingress
      - equal:
          path: metadata.name
          value: mpchess
      - equal:
          path: spec.rules[0].host
          value: chess.example.com
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: Prefix
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: mpchess
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 3000

  - it: has cert-manager and nginx annotations
    set:
      gateway:
        type: ingress
        ingressAnnotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
          nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    asserts:
      - equal:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]
          value: letsencrypt-prod
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/proxy-read-timeout"]
          value: "3600"
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/proxy-send-timeout"]
          value: "3600"

  - it: custom host
    set:
      gateway:
        type: ingress
        host: my-chess.example.com
    asserts:
      - equal:
          path: spec.rules[0].host
          value: my-chess.example.com

  - it: custom ingressClassName
    set:
      gateway:
        type: ingress
        ingressClassName: nginx
    asserts:
      - equal:
          path: spec.ingressClassName
          value: nginx

  - it: TLS configures secret
    set:
      gateway:
        type: ingress
        tlsSecretName: my-tls-secret
    asserts:
      - equal:
          path: spec.tls[0].hosts[0]
          value: chess.example.com
      - equal:
          path: spec.tls[0].secretName
          value: my-tls-secret

  - it: custom annotations
    set:
      gateway:
        type: ingress
        ingressAnnotations:
          nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
          nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    asserts:
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/proxy-read-timeout"]
          value: "3600"
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/proxy-send-timeout"]
          value: "3600"

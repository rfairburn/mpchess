suite: gateway
release:
  name: mpchess
templates:
  - templates/gateway.yaml
tests:
  - it: no document when gateway type is ingress (default)
    set:
      gateway:
        type: ingress
    asserts:
      - hasDocuments:
          count: 0

  - it: renders Gateway when gateway type is httproute
    set:
      gateway:
        type: httproute
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Gateway
      - equal:
          path: metadata.name
          value: mpchess
      - equal:
          path: spec.gatewayClassName
          value: traefik
      - equal:
          path: spec.listeners[0].name
          value: http
      - equal:
          path: spec.listeners[0].protocol
          value: HTTP
      - equal:
          path: spec.listeners[0].port
          value: 80
      - equal:
          path: spec.listeners[1].name
          value: https
      - equal:
          path: spec.listeners[1].protocol
          value: HTTPS
      - equal:
          path: spec.listeners[1].port
          value: 443
      - equal:
          path: spec.listeners[1].tls.mode
          value: Terminate
      - equal:
          path: spec.listeners[1].tls.certificateRefs[0].name
          value: mpchess-tls

  - it: has cert-manager annotation when issuer set
    set:
      gateway:
        type: httproute
        issuer: letsencrypt-prod
    asserts:
      - equal:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]
          value: letsencrypt-prod

  - it: no cert-manager annotation when issuer not set
    set:
      gateway:
        type: httproute
        issuer: ""
    asserts:
      - isNull:
          path: metadata.annotations

  - it: custom hostname
    set:
      gateway:
        type: httproute
        host: my-chess.example.com
    asserts:
      - equal:
          path: spec.listeners[0].hostname
          value: my-chess.example.com
      - equal:
          path: spec.listeners[1].hostname
          value: my-chess.example.com

  - it: custom gateway name and className
    set:
      gateway:
        type: httproute
        name: chess-gateway
        className: envoy-gateway
    asserts:
      - equal:
          path: metadata.name
          value: chess-gateway
      - equal:
          path: spec.gatewayClassName
          value: envoy-gateway

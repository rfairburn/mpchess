apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mpchess.fullname" . }}
  labels:
    {{- include "mpchess.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "mpchess.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mpchess.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- include "mpchess.serverArgs" . | nindent 12 }}
          ports:
            - name: {{ include "mpchess.portName" . }}
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          env:
            - name: MPCHESS_PORT
              value: {{ .Values.server.port | toString | quote }}
            {{- if .Values.tls.enabled }}
            - name: MPCHESS_CERT
              value: "/etc/tls/tls.crt"
            - name: MPCHESS_KEY
              value: "/etc/tls/tls.key"
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ include "mpchess.portName" . }}
            {{- if .Values.tls.enabled }}
            scheme: HTTPS
            {{- end }}
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: {{ include "mpchess.portName" . }}
            {{- if .Values.tls.enabled }}
            scheme: HTTPS
            {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if or .Values.config.enabled .Values.tls.enabled }}
          volumeMounts:
            {{- if .Values.config.enabled }}
            - name: config
              mountPath: /app/config.json
              subPath: config.json
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /etc/tls/tls.crt
              subPath: tls.crt
              readOnly: true
            - name: tls
              mountPath: /etc/tls/tls.key
              subPath: tls.key
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if or .Values.config.enabled .Values.tls.enabled }}
      volumes:
        {{- if .Values.config.enabled }}
        - name: config
          configMap:
            name: {{ include "mpchess.fullname" . }}-config
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.secretName }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

{{- if eq .Values.gateway.type "httproute" }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "mpchess.fullname" . }}
  labels:
    {{- include "mpchess.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.gatewayName }}
      namespace: {{ .Values.gateway.gatewayNamespace }}
  hostnames:
    - "{{ .Values.gateway.host }}"
  rules:
    - backendRefs:
        - name: {{ include "mpchess.fullname" . }}
          port: {{ .Values.service.port }}
      matches:
        - path:
            type: PathPrefix
            value: /
---
# TLS section on the HTTPRoute (references existing secret)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "mpchess.fullname" . }}-tls
  labels:
    {{- include "mpchess.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.gatewayName }}
      namespace: {{ .Values.gateway.gatewayNamespace }}
      sectionName: {{ .Values.gateway.tlsSecretName | default (printf "%s-tls" (include "mpchess.fullname" .)) }}
  hostnames:
    - "{{ .Values.gateway.host }}"
  rules:
    - backendRefs:
        - name: {{ include "mpchess.fullname" . }}
          port: {{ .Values.service.port }}
      matches:
        - path:
            type: PathPrefix
            value: /
{{- end }}

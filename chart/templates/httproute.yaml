{{- if eq .Values.gateway.type "httproute" }}
# HTTPS route — serves traffic on the Gateway's HTTPS listener
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "mpchess.fullname" . }}
  labels:
    {{- include "mpchess.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      sectionName: https
  hostnames:
    - "{{ .Values.gateway.host }}"
  rules:
    - backendRefs:
        - name: {{ include "mpchess.fullname" . }}
          port: {{ .Values.service.port }}
      matches:
        - path:
            type: PathPrefix
            value: /
---
# HTTP-to-HTTPS redirect
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "mpchess.fullname" . }}-http-redirect
  labels:
    {{- include "mpchess.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      sectionName: http
  hostnames:
    - "{{ .Values.gateway.host }}"
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
{{- end }}

{{- if and (ne .Values.gateway.type "none") (eq .Values.gateway.type "ingress") }}
{{- $prefix := include "mpchess.pathPrefix" . }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mpchess.fullname" . }}
  labels:
    {{- include "mpchess.labels" . | nindent 4 }}
  {{- if or .Values.gateway.ingressAnnotations (and (ne $prefix "/") .Values.gateway.ingressController) (include "mpchess.backendTlsEnabled" .) }}
  annotations:
    {{- range $key, $value := .Values.gateway.ingressAnnotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
    {{- if and (ne $prefix "/") (eq .Values.gateway.ingressController "traefik") }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ include "mpchess.fullname" . }}-strip@kubernetescrd
    {{- end }}
    {{- if and (ne $prefix "/") (eq .Values.gateway.ingressController "nginx") }}
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    {{- end }}
    {{- if and (include "mpchess.backendTlsEnabled" .) (eq .Values.gateway.ingressController "nginx") }}
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-ssl-name: {{ .Values.gateway.host | quote }}
    {{- if .Values.gateway.backendTls.insecureSkipVerify }}
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
    {{- else }}
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "on"
    nginx.ingress.kubernetes.io/proxy-ssl-secret: {{ printf "%s/%s" .Release.Namespace (include "mpchess.caSecretName" .) | quote }}
    {{- end }}
    {{- end }}
  {{- end }}
spec:
  {{- if .Values.gateway.ingressClassName }}
  ingressClassName: {{ .Values.gateway.ingressClassName }}
  {{- end }}
  {{- if .Values.gateway.tlsSecretName }}
  tls:
    - hosts:
        - "{{ .Values.gateway.host }}"
      secretName: {{ .Values.gateway.tlsSecretName }}
  {{- end }}
  rules:
    - host: "{{ .Values.gateway.host }}"
      http:
        paths:
          - path: {{ if and (ne $prefix "/") (eq .Values.gateway.ingressController "nginx") }}"{{ $prefix }}(/|$)(.*)"{{ else }}{{ $prefix }}{{ end }}
            pathType: {{ if and (ne $prefix "/") (eq .Values.gateway.ingressController "nginx") }}ImplementationSpecific{{ else }}Prefix{{ end }}
            backend:
              service:
                name: {{ include "mpchess.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}

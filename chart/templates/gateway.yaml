{{- if eq .Values.gateway.type "httproute" }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  labels:
    {{- include "mpchess.labels" . | nindent 4 }}
  {{- if .Values.gateway.issuer }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.gateway.issuer }}
  {{- end }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    - name: http
      hostname: "{{ .Values.gateway.host }}"
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      hostname: "{{ .Values.gateway.host }}"
      protocol: HTTPS
      port: 443
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ .Values.gateway.tlsSecretName }}
{{- end }}
